<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
Signup <br>

<form th:action="@{/signup}" method="post" th:object="${User}">
    Full name: <input type="text" th:field="*{name}"> <br>
    Username: <input type="text" th:field="*{username}"> <br>
    Password: <input type="password" th:field="*{password}">
    <input type="submit" value="Submit">
</form>
</body>
</html>
